name: Build SWU

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build SWU
        run: |
          chmod +x build/build-swu.sh
          mkdir -p build/dist
          docker run --rm \
            -e KOBRA_MODEL_CODE=KS1 \
            -v ${{ github.workspace }}/build:/build \
            -v ${{ github.workspace }}/apps:/apps \
            ghcr.io/jbatonnet/rinkhals/build \
            /build/build-swu.sh "/apps/60-buzzer-service"

      - name: Upload SWU as release asset
        uses: softprops/action-gh-release@v1
        with:
          files: build/dist/60-buzzer-service.swu