name: Build SWU

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build SWU
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/build:/build \
            -v ${{ github.workspace }}/apps:/apps \
            ghcr.io/jbatonnet/rinkhals/build \
            /build/build-swu.sh "71-buzzer-service"

      - name: Upload SWU as release asset
        uses: softprops/action-gh-release@v1
        with:
          files: build/71-buzzer-service.swu