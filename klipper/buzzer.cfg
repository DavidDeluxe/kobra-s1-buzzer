# =============================================================================
# Kobra S1 Buzzer Service - Klipper Configuration
# =============================================================================
#
# This file configures M300 buzzer support for the Anycubic Kobra S1.
# The buzzer is driven by a TCP server running on the printer's SoC,
# triggered from Klipper via socat over your local network.
#
# SETUP: Replace [PRINTER_IP] with your printer's IP address in the three
# gcode_shell_command blocks below (buzzer_simple_beep, buzzer_tune, buzzer_stop).
#
# Include this file in your printer.cfg:
#   [include buzzer.cfg]
# =============================================================================


# -----------------------------------------------------------------------------
# BLOCKING BEEP COMMAND
# -----------------------------------------------------------------------------
# Sends a single frequency/duration pair to the buzzer server on the printer.
# Used by M300 for short tones. Called with two arguments: frequency and duration.
# This is "blocking" because M300 uses G4 to wait for the note to finish
# before moving to the next command, ensuring correct rhythm in tune sequences.
# -----------------------------------------------------------------------------

[gcode_shell_command buzzer_simple_beep]
command: /bin/sh -c 'echo "$0 $1" | socat - TCP:[PRINTER_IP]:7777'
timeout: 5.0
verbose: False


# -----------------------------------------------------------------------------
# M300 - STANDARD BUZZER TONE COMMAND
# -----------------------------------------------------------------------------
# Standard M300 implementation.
#
# Usage:
#   M300 S<frequency_hz> P<duration_ms>
#
# Parameters:
#   S - Frequency in Hz (default: 1000). Use S0 for silence.
#   P - Duration in milliseconds (default: 100)
#
# Examples:
#   M300 S1000 P500   ; 1kHz tone for 500ms
#   M300 S440 P300    ; A4 note for 300ms
#   M300 S0 P200      ; Silence for 200ms
#
# Note: G4 P{P} at the end makes Klipper wait for the note duration before
# proceeding, ensuring correct timing when multiple M300 calls are chained.
# -----------------------------------------------------------------------------

[gcode_macro M300]
description: Play a tone via the Kobra S1 built-in buzzer
gcode:
    {% set S = params.S|default(1000)|int %}
    {% set P = params.P|default(100)|int %}
    {% if S > 0 %}
        RUN_SHELL_COMMAND CMD=buzzer_simple_beep PARAMS="{S} {P}"
    {% else %}
        G4 P{P}
    {% endif %}
    G4 P{P}


# -----------------------------------------------------------------------------
# NON-BLOCKING TUNE COMMAND
# -----------------------------------------------------------------------------
# Sends a tune name to the buzzer server on the printer. The printer looks up
# the tune file by name and plays it entirely on its own SoC, returning
# instantly so Klipper is not blocked during playback.
#
# Tune files are GCODE files located on the printer at:
#   /useremain/home/rinkhals/apps/buzzer-service/tunes/<name>.gcode
#
# To add a new tune:
#   1. Add <name>.gcode to the tunes/ folder on the printer
#   2. Add a TUNE_<NAME> macro below calling PLAY_TUNE TUNE=<name>
#
# Use https://bitmidi.com/ to find MIDI files
# then convert to GCODE using a tool like https://www.layerfused.com/MIDI-M300
# Copy the generated GCODE and save it to a .gcode file in the tunes/ folder on 
# the printer, ensuring the filename matches the TUNE name you want to use in Klipper.
# -----------------------------------------------------------------------------

[gcode_shell_command buzzer_tune]
command: /bin/sh -c 'echo "$0" | socat - TCP:[PRINTER_IP]:7777'
timeout: 5.0
verbose: False

[gcode_macro PLAY_TUNE]
description: Play a named tune non-blocking. Usage: PLAY_TUNE TUNE=<name>
gcode:
    {% set tune = params.TUNE|default("")|upper %}
    RUN_SHELL_COMMAND CMD=buzzer_tune PARAMS="{tune}"

[gcode_macro STOP_TUNE]
description: Stop any currently playing tune
gcode:
    RUN_SHELL_COMMAND CMD=buzzer_stop

[gcode_shell_command buzzer_stop]
command: /bin/sh -c 'echo "STOP" | socat - TCP:[PRINTER_IP]:7777'
timeout: 5.0
verbose: False


# =============================================================================
# BUILT-IN TUNES
# =============================================================================
#
# Short tunes use M300 sequences (blocking - Klipper waits for completion).
# Long tunes use PLAY_TUNE (non-blocking - Klipper continues immediately).
#
# Suggested usage:
#   END_PRINT    -> TUNE_PRINT_DONE
#   CANCEL_PRINT -> TUNE_PRINT_FAILED
#   START_PRINT  -> TUNE_READY
# =============================================================================


# --- Short tunes (blocking M300 sequences) -----------------------------------

[gcode_macro TUNE_PRINT_DONE]
description: Play a short done tune at the end of a print
gcode:
    M300 S880 P150
    M300 S0 P50
    M300 S880 P150
    M300 S0 P50
    M300 S1760 P350

[gcode_macro TUNE_PRINT_FAILED]
description: Play a short failure tune when a print is cancelled
gcode:
    M300 S1000 P250
    M300 S0 P50
    M300 S800 P250
    M300 S0 P50
    M300 S600 P500

[gcode_macro TUNE_BEEP]
description: Play a single short beep
gcode:
    M300 S1000 P100

[gcode_macro TUNE_READY]
description: Play a short ready tune when the printer is homed and ready
gcode:
    M300 S440 P150
    M300 S0 P50
    M300 S880 P150


# --- Long tunes (non-blocking, played on the printer SoC) --------------------

[gcode_macro TUNE_ASTRONOMIA]
gcode:
    PLAY_TUNE TUNE=astronomia

[gcode_macro TUNE_BADGUY]
